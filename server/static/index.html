<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Client</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="upload-container">
      <!-- The enctype attribute is crucial for file uploads -->
      <form id="pdfUploadForm" enctype="multipart/form-data">
        <div class="form-group">
          <label for="pdfFile">Select PDF File:</label>
          <input
            type="file"
            id="pdfFile"
            name="pdfFile"
            accept=".pdf"
            required
          />
        </div>
        <button type="submit">Upload to Server</button>
      </form>

      <div id="statusMessage"></div>

      <hr class="section-divider" />

      <!-- NEW: TEXT INPUT & LIST SECTION -->
      <div class="text-list-container">
        <form id="sentenceForm">
          <div class="form-group">
            <label for="sentenceInput">Type your search:</label>
            <input
              type="text"
              id="sentenceInput"
              placeholder="Enter your search"
              required
            />
          </div>
          <button type="submit">Search</button>
        </form>

        <ul id="sentenceList">
          <!-- Sentences will appear here dynamically -->
        </ul>
      </div>
    </div>

    <script src="./index.js"></script>
  </body>
</html>
